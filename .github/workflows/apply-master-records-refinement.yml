name: Apply Master Records refinement

on:
  workflow_dispatch:
  push:
    paths:
      - '.build/master-records-refinement/patch.py'
      - '.github/workflows/apply-master-records-refinement.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply coordinated refinement
        run: |
          python .build/master-records-refinement/patch.py
          node --check staff-business-operational.js

      - name: Commit refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add staff-business-operational.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refine Master Records database and workspaces"
            git push
          fi
