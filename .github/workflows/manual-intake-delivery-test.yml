name: Manual Intake Delivery Test

on:
  push:
    paths:
      - '.github/workflows/manual-intake-delivery-test.yml'
  workflow_dispatch:

jobs:
  test-all-intakes:
    runs-on: ubuntu-latest
    steps:
      - name: Send Volunteer, Partner, and Business tests
        shell: bash
        run: |
          set -euo pipefail
          API='https://xrunawtqotumbsztboxo.supabase.co/rest/v1/applications'
          KEY='sb_publishable_UyoqGKapp6Da2CNE4qqlZA_BodqSra8'
          EMAIL='https://formsubmit.co/ajax/info@heartlandpridecenter.org'
          STAMP="$(date -u +%Y%m%d-%H%M%S)"

          submit_db() {
            NAME="$1"
            PAYLOAD="$2"
            CODE=$(curl --silent --show-error --output "${NAME}-db.txt" --write-out '%{http_code}' \
              --request POST "$API" \
              --header "apikey: $KEY" \
              --header "Authorization: Bearer $KEY" \
              --header 'Content-Type: application/json' \
              --header 'Prefer: return=minimal' \
              --data "$PAYLOAD")
            echo "$NAME Supabase HTTP $CODE"
            test "$CODE" = "201" -o "$CODE" = "204"
          }

          submit_email() {
            NAME="$1"
            shift
            CODE=$(curl --silent --show-error --output "${NAME}-email.txt" --write-out '%{http_code}' \
              --request POST "$EMAIL" \
              --header 'Accept: application/json' \
              "$@")
            echo "$NAME email HTTP $CODE"
            cat "${NAME}-email.txt"
            test "$CODE" = "200"
          }

          submit_db volunteer "{\"type\":\"volunteer\",\"status\":\"new\",\"organization_name\":\"HPC SYSTEM TEST - Volunteer ${STAMP}\",\"contact_name\":\"HPC System Test\",\"email\":\"info@heartlandpridecenter.org\",\"phone\":\"863-555-0100\",\"category\":\"Volunteer Interest\",\"city\":\"Lake Wales\",\"county\":\"Polk\",\"description\":\"End-to-end volunteer intake test. Archive after verification.\",\"notes\":\"TEST ONLY ${STAMP}\"}"
          submit_email volunteer \
            --form-string "name=HPC System Test" \
            --form-string "email=info@heartlandpridecenter.org" \
            --form-string "phone=863-555-0100" \
            --form-string "city=Lake Wales" \
            --form-string "interests=End-to-end volunteer intake test" \
            --form-string "availability=Flexible" \
            --form-string "experience_notes=TEST ONLY - archive after verification" \
            --form-string "_subject=[HPC Volunteer Form] TEST Volunteer Interest ${STAMP}" \
            --form-string "_template=table" \
            --form-string "_captcha=false"

          submit_db partner "{\"type\":\"partner\",\"status\":\"new\",\"organization_name\":\"HPC SYSTEM TEST - Partner ${STAMP}\",\"contact_name\":\"HPC System Test\",\"email\":\"info@heartlandpridecenter.org\",\"phone\":\"863-555-0100\",\"category\":\"Partnership Inquiry\",\"city\":\"Lake Wales\",\"county\":\"Polk\",\"description\":\"End-to-end partner intake test. Archive after verification.\",\"notes\":\"TEST ONLY ${STAMP}\"}"
          submit_email partner \
            --form-string "organization=HPC SYSTEM TEST - Partner ${STAMP}" \
            --form-string "contact_name=HPC System Test" \
            --form-string "email=info@heartlandpridecenter.org" \
            --form-string "phone=863-555-0100" \
            --form-string "city=Lake Wales" \
            --form-string "partnership_type=Community collaboration" \
            --form-string "message=End-to-end partner intake test. TEST ONLY." \
            --form-string "_subject=[HPC Partner Form] TEST Partnership Inquiry ${STAMP}" \
            --form-string "_template=table" \
            --form-string "_captcha=false"

          submit_db business "{\"type\":\"business\",\"status\":\"pending\",\"organization_name\":\"HPC SYSTEM TEST - Business ${STAMP}\",\"contact_name\":\"HPC System Test\",\"email\":\"info@heartlandpridecenter.org\",\"phone\":\"863-555-0100\",\"category\":\"Professional Services\",\"city\":\"Lake Wales\",\"county\":\"Polk\",\"description\":\"End-to-end Business Network intake test. Archive after verification.\",\"notes\":\"TEST ONLY ${STAMP}\"}"
          submit_email business \
            --form-string "business_name=HPC SYSTEM TEST - Business ${STAMP}" \
            --form-string "category=Professional Services" \
            --form-string "address=123 Test Way" \
            --form-string "city=Lake Wales" \
            --form-string "website=heartlandpridecenter.org" \
            --form-string "contact_name=HPC System Test" \
            --form-string "email=info@heartlandpridecenter.org" \
            --form-string "phone=863-555-0100" \
            --form-string "preferred_contact=Email" \
            --form-string "description=End-to-end Business Network intake test. TEST ONLY." \
            --form-string "_subject=[HPC Business Network] TEST Application ${STAMP}" \
            --form-string "_template=table" \
            --form-string "_captcha=false"
